name: Migrate Feature DB

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
  workflow_dispatch:

concurrency:
  group: migrate-feature-db-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate-and-seed:
    # Exclude dev↔main PRs
    if: >-
      !(github.head_ref == 'dev' && github.base_ref == 'main') &&
      !(github.head_ref == 'main' && github.base_ref == 'dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to feature DB
        run: supabase db push --db-url "${{ secrets.FEATURE_DB_URL }}"

      # - name: Seed feature DB
      #   run: psql -v ON_ERROR_STOP=1 "${{ secrets.FEATURE_DB_URL }}" -f supabase/seed.sql
