name: PR Preview

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]

jobs:
  preview:
    name: eas-update-preview
    if: >-
      !(github.head_ref == 'dev' && github.base_ref == 'main') &&
      !(github.head_ref == 'main' && github.base_ref == 'dev')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build preview metadata
        id: preview_meta
        shell: bash
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"

          TITLE_SLUG=$(printf '%s' "$PR_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
            | cut -c1-40)

          if [ -z "$TITLE_SLUG" ]; then
            TITLE_SLUG="update"
          fi

          BRANCH="pr-${{ github.event.number }}-$TITLE_SLUG"

          BODY_SUMMARY=$(printf '%s' "$PR_BODY" \
            | tr '\n' ' ' \
            | sed -E 's/[[:space:]]+/ /g; s/^ +| +$//g' \
            | cut -c1-140)

          if [ -n "$BODY_SUMMARY" ]; then
            MESSAGE="PR #${{ github.event.number }}: $PR_TITLE | $BODY_SUMMARY"
          else
            MESSAGE="PR #${{ github.event.number }}: $PR_TITLE"
          fi

          {
            echo "branch=$BRANCH"
            echo "message<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert preview comment (building)
        id: preview_comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- eas-preview-comment -->';
            const body = `${marker}\n### 🟠 Preview Building\n\nPreparing EAS Update for branch \`${{ steps.preview_meta.outputs.branch }}\`.\n\nPlanned message: \`${{ steps.preview_meta.outputs.message }}\``;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.body && comment.body.includes(marker)
            );

            let commentId;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              commentId = existing.id;
            } else {
              const { data: created } = await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
              commentId = created.id;
            }

            core.setOutput('comment_id', String(commentId));

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish preview update
        id: publish
        shell: bash
        run: |
          OUTPUT=$(eas update \
            --branch "${{ steps.preview_meta.outputs.branch }}" \
            --message "${{ steps.preview_meta.outputs.message }}" \
            --json)

          GROUP_ID=$(echo "$OUTPUT" | jq -r '.[0].group // empty')
          UPDATE_MESSAGE=$(echo "$OUTPUT" | jq -r '.[0].message // empty')
          RUNTIME_VERSION=$(echo "$OUTPUT" | jq -r '.[0].runtimeVersion // empty')
          CREATED_AT=$(echo "$OUTPUT" | jq -r '.[0].createdAt // empty')

          if [ -n "$GROUP_ID" ]; then
            DASHBOARD_URL="https://expo.dev/accounts/hoop33-dev/projects/hooper/updates/${GROUP_ID}"
          else
            DASHBOARD_URL="https://expo.dev/accounts/hoop33-dev/projects/hooper"
          fi

          echo "group_id=$GROUP_ID" >> "$GITHUB_OUTPUT"
          echo "update_message=$UPDATE_MESSAGE" >> "$GITHUB_OUTPUT"
          echo "runtime_version=$RUNTIME_VERSION" >> "$GITHUB_OUTPUT"
          echo "created_at=$CREATED_AT" >> "$GITHUB_OUTPUT"
          echo "dashboard_url=$DASHBOARD_URL" >> "$GITHUB_OUTPUT"
        env:
          CI: "1"

      - name: Update preview comment (ready)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- eas-preview-comment -->';
            const groupId = '${{ steps.publish.outputs.group_id }}';
            const updateMessage = '${{ steps.publish.outputs.update_message }}';
            const runtimeVersion = '${{ steps.publish.outputs.runtime_version }}';
            const createdAt = '${{ steps.publish.outputs.created_at }}';
            const dashboardUrl = '${{ steps.publish.outputs.dashboard_url }}';
            const projectId = '0d004a05-6825-40ab-8640-f2567d841f31';
            const qrUrl = `https://qr.expo.dev/eas-update?slug=exp&projectId=${projectId}&groupId=${groupId}&host=u.expo.dev`;
            const expoPreviewUrl = `https://expo.dev/preview/update?message=${encodeURIComponent(updateMessage)}&updateRuntimeVersion=${encodeURIComponent(runtimeVersion)}&createdAt=${encodeURIComponent(createdAt)}&slug=exp&projectId=${projectId}&group=${groupId}`;
            const body = `${marker}\n### 🟢 Preview Ready\n\nEAS Update published for branch \`${{ steps.preview_meta.outputs.branch }}\`.\n\n<img src="${qrUrl}" width="250" height="250" />\n\n[Open Preview](${expoPreviewUrl}) · [Open in EAS Dashboard](${dashboardUrl})\n\nIf you're on mobile with Expo Go installed, use Open Preview or scan the QR code to launch the update.`;

            const commentId = Number('${{ steps.preview_comment.outputs.comment_id }}');
            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                body,
              });
            } else {
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body,
                });
              }
            }

      - name: Update preview comment (failed)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- eas-preview-comment -->';
            const body = `${marker}\n### 🔴 Preview Failed\n\nFailed to publish EAS Update for branch \`${{ steps.preview_meta.outputs.branch }}\`.\n\nPlanned message: \`${{ steps.preview_meta.outputs.message }}\`\n\nCheck the workflow logs for details.`;

            const commentId = Number('${{ steps.preview_comment.outputs.comment_id }}');
            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                body,
              });
            } else {
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body,
                });
              }
            }
