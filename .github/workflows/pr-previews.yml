name: PR Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: eas-update-preview
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview metadata
        id: preview_meta
        shell: bash
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"

          BRANCH="PR-${{ github.event.number }}"

          BODY_SUMMARY=$(printf '%s' "$PR_BODY" \
            | tr '\n' ' ' \
            | sed -E 's/[[:space:]]+/ /g; s/^ +| +$//g' \
            | cut -c1-140)

          if [ -n "$BODY_SUMMARY" ]; then
            MESSAGE="PR #${{ github.event.number }}: $PR_TITLE | $BODY_SUMMARY"
          else
            MESSAGE="PR #${{ github.event.number }}: $PR_TITLE"
          fi

          {
            echo "branch=$BRANCH"
            echo "message<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert preview comment (building)
        id: preview_comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- eas-preview-comment -->';
            const body = `${marker}\n### 🟠 Preview Building\n\nPreparing EAS Update for branch \`${{ steps.preview_meta.outputs.branch }}\`.\n\nPlanned message: \`${{ steps.preview_meta.outputs.message }}\``;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.body && comment.body.includes(marker)
            );

            let commentId;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              commentId = existing.id;
            } else {
              const { data: created } = await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
              commentId = created.id;
            }

            core.setOutput('comment_id', String(commentId));

      - name: Publish preview update
        run: |
          eas update \
            --branch "${{ steps.preview_meta.outputs.branch }}" \
            --environment development \
            --message "${{ steps.preview_meta.outputs.message }}"
        env:
          CI: "1"

      - name: Update preview comment (ready)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- eas-preview-comment -->';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: Number('${{ steps.preview_comment.outputs.comment_id }}'),
              body: `${marker}\n### 🟢 Preview Ready\n\nEAS Update published for branch \`${{ steps.preview_meta.outputs.branch }}\`.\n\nUpdate message: \`${{ steps.preview_meta.outputs.message }}\`\n\n[Open in EAS Dashboard](https://expo.dev) to get the QR code, or open Expo Go and switch to this update channel.`,
            });

      - name: Update preview comment (failed)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- eas-preview-comment -->';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: Number('${{ steps.preview_comment.outputs.comment_id }}'),
              body: `${marker}\n### 🔴 Preview Failed\n\nFailed to publish EAS Update for branch \`${{ steps.preview_meta.outputs.branch }}\`.\n\nPlanned message: \`${{ steps.preview_meta.outputs.message }}\`\n\nCheck the workflow logs for details.`,
            });
